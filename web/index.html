<!DOCTYPE html>
<html lang="ja" data-theme="night">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>書架＋年表 — 京都古典籍 全文検索</title>
<link rel="stylesheet" href="tokens.css?v=8">
<link rel="stylesheet" href="style.css?v=8">
<style>
/* スマホのタイル表示を確実に適用（外部CSSの順序・キャッシュに依存しない最終指定） */
@media (max-width:820px){
  #shelves .rail{gap:0 !important;padding:4px 4px 10px !important}
  #shelves .bcard,.recview .bcard{width:96px !important;border-radius:0 !important;margin:0 !important}
  #shelves .shelf.open .rail,.recview .rv-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr)) !important;gap:0 !important}
  #shelves .bcard .imgwrap,.recview .bcard .imgwrap{border-radius:0 !important}
}
@media (max-width:480px){
  #shelves .bcard{width:86px !important}
  #shelves .shelf.open .rail,.recview .rv-grid{grid-template-columns:repeat(4,1fr) !important;gap:0 !important}
}
</style>
</head>
<body>
<div class="top">
  <div class="top-in">
    <div class="brand"><span class="dot"></span><span class="serif">京都古典籍</span><span class="txt modetag">書架＋年表で巡る</span></div>
    <div class="search" id="search"><span class="ic">⌕</span>
      <input id="q" type="search" placeholder="本文・建造物・資料名・年号で検索" autocomplete="off">
      <div class="suggest" id="suggest"></div>
    </div>
  </div>
</div>

<div class="tl-wrap">
  <div class="tl-head"><b>年表で巡る</b><span id="tlsub">点をクリックで資料へ、世紀をクリック／帯をドラッグで年代を絞り込み</span>
    <button class="clear" id="tlclear">年代の絞り込みを解除 ✕</button></div>
  <div class="timeline" id="timeline">
    <div class="tl-band" id="tlband"></div>
    <div class="tl-hint">ドラッグで範囲選択</div>
    <div class="tl-axis"></div>
  </div>
  <div class="tl-chips" id="tlchips"></div>
</div>

<div class="applied" id="applied"></div>
<div class="shelves" id="shelves"></div>
<section class="recview" id="recview"></section>

<div class="modal" id="modal"><div class="dcard" id="dcard"></div></div>

<div class="palette" id="palette">
  <button class="pal-x" id="palMin" title="畳む">▾</button>
  <div class="pal-h">配色 <span>藍鉄ナイト 確定</span></div>
  <div class="pal-opts" id="palOpts"></div>
</div>
<button class="pal-min" id="palOpen">◧ 配色</button>

<footer class="ftr" id="ftr"></footer>

<script src="app.js?v=8"></script>
</body>
</html>
