<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box}
body{margin:0;background:#f7f5ef;color:#2b2622;padding:18px;line-height:1.7}
.rec{background:#fffdf8;border:1px solid #e2dccf;border-radius:10px;padding:.8rem 1rem;margin:.7rem 0;max-width:760px}
.rec-head{display:flex;align-items:baseline;gap:.6rem}

.rec-title{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;margin:0;font-size:1.08rem}
.yomi{font-size:.76rem;color:#7a7165;margin-left:.5rem;font-weight:normal}
.rec-sub{color:#7a7165;font-size:.82rem;margin-top:.25rem;font-family:sans-serif}
.src{color:#8a5a2b;margin-left:.5rem;font-size:.78rem;text-decoration:none}
.toggle-pages{margin-top:.6rem;font-family:sans-serif;font-size:.82rem;background:#f1ece1;border:1px solid #e2dccf;border-radius:6px;padding:.3rem .7rem;cursor:pointer}
mark{background:#ffe1a8}
</style></head><body>
<article class="rec">

</article>
<article class="rec">
  <div class="rec-head"><span class="badge">絵図・地図</span>
    <h2 class="rec-title">京都<mark>図</mark><span class="yomi">キョウト ズ</span></h2></div>
  <div class="rec-sub">分類 291.62　/　刊年 文政七年</div>
</article>
</body></html>
