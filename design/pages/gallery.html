<style>
*{box-sizing:border-box}

.ptype{font-family:sans-serif;font-size:.66rem;background:#2f6f6a;color:#fff;padding:.06rem .35rem;border-radius:4px}
</style></head><body>
<div class="gallery">

</body></html>
