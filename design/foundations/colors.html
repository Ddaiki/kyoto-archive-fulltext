<!-- @dsCard group="Foundations" name="Colors / 配色" -->
<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,"Hiragino Kaku Gothic ProN",sans-serif;background:#f7f5ef;color:#2b2622;padding:24px}
h2{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:1.1rem;margin:0 0 1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.sw{border:1px solid #e2dccf;border-radius:10px;overflow:hidden;background:#fff}
.chip{height:72px}
.meta{padding:.5rem .6rem;font-size:.74rem;line-height:1.5}
.meta b{display:block;font-size:.8rem}
.role{color:#7a7165}
</style></head><body>
<h2>配色トークン — 和の古典籍にふさわしい温かみのあるセピア基調</h2>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#f7f5ef"></div><div class="meta"><b>--bg #F7F5EF</b><span class="role">背景（生成り）</span></div></div>
  <div class="sw"><div class="chip" style="background:#fffdf8"></div><div class="meta"><b>--card #FFFDF8</b><span class="role">カード面</span></div></div>
  <div class="sw"><div class="chip" style="background:#2b2622"></div><div class="meta"><b>--ink #2B2622</b><span class="role">本文・墨</span></div></div>
  <div class="sw"><div class="chip" style="background:#7a7165"></div><div class="meta"><b>--muted #7A7165</b><span class="role">補助テキスト</span></div></div>
  <div class="sw"><div class="chip" style="background:#8a5a2b"></div><div class="meta"><b>--accent #8A5A2B</b><span class="role">アクセント（朽葉）</span></div></div>
  <div class="sw"><div class="chip" style="background:#2f6f6a"></div><div class="meta"><b>--diagram #2F6F6A</b><span class="role">図面バッジ・西暦</span></div></div>
  <div class="sw"><div class="chip" style="background:#e2dccf"></div><div class="meta"><b>--line #E2DCCF</b><span class="role">罫線・枠</span></div></div>
  <div class="sw"><div class="chip" style="background:#ffe1a8"></div><div class="meta"><b>mark #FFE1A8</b><span class="role">検索ハイライト</span></div></div>
</div>
</body></html>
