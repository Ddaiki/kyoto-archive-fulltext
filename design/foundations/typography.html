<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box}
body{margin:0;background:#f7f5ef;color:#2b2622;padding:24px;line-height:1.7}
.serif{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif}
.sans{font-family:system-ui,"Hiragino Kaku Gothic ProN",sans-serif}
.row{border-bottom:1px solid #e2dccf;padding:.7rem 0}
.lbl{font-family:system-ui,sans-serif;font-size:.68rem;color:#7a7165}
h1{font-size:1.4rem;margin:.2rem 0;letter-spacing:.04em}
h2{font-size:1.1rem;margin:.2rem 0}
.body{font-size:1rem}
.tate{writing-mode:vertical-rl;height:160px;font-size:1.05rem;border:1px solid #e2dccf;background:#fffdf8;padding:12px;border-radius:8px;display:inline-block}
</style></head><body>
<div class="row"><div class="lbl">見出し / 明朝 1.4rem</div><h1 class="serif">京都古典籍 全文検索</h1></div>
<div class="row"><div class="lbl">小見出し / 明朝 1.1rem</div><h2 class="serif">華頂要略 本篇170巻</h2></div>
<div class="row"><div class="lbl">本文・翻刻 / 明朝 1rem</div><div class="serif body">門首御伝　第十七入道尊祐親王　自元祿十二年　至享保十六年</div></div>
<div class="row"><div class="lbl">UI・ラベル / sans 0.76rem</div><div class="sans" style="font-size:.76rem">区分　分類(NDC)　ページ種別　建造物　年号</div></div>
<div class="row"><div class="lbl">縦組み検討（翻刻の縦書き表示）</div>
  <div class="tate serif">鐘楼堂　塀重門　庫裡　三十三間　表門　遠州流道場</div>
</div>
</body></html>
